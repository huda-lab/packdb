[pytest]
testpaths = tests
markers =
    # Variable types
    var_boolean: Boolean (0/1) decision variables
    var_integer: Integer decision variables
    var_real: Continuous (REAL) decision variables
    var_multi: Multiple decision variables

    # Constraints
    cons_aggregate: SUM-based aggregate constraints
    cons_perrow: Per-row variable bounds
    cons_mixed: Aggregate + per-row in same query
    cons_comparison: Comparison operators (=, <>, <=, >=)
    cons_between: BETWEEN ... AND ... constraints
    cons_in: IN (...) constraints
    cons_subquery: Subquery on constraint RHS
    cons_multi: Multiple constraints in one query

    # Objectives
    obj_maximize: MAXIMIZE objective
    obj_minimize: MINIMIZE objective
    obj_complex: Complex coefficient arithmetic

    # WHEN clause
    when: General WHEN modifier (on constraints or objectives)
    when_constraint: WHEN on aggregate constraints
    when_perrow: WHEN on per-row constraints
    when_objective: WHEN on objective
    when_compound: Compound WHEN conditions (AND/OR)

    # SQL features
    sql_joins: JOINs with DECIDE
    sql_subquery: Subqueries in various positions

    # Error cases
    error_parser: Parser-level syntax errors
    error_binder: Binder-level semantic errors
    error_infeasible: Infeasible models
    error: Meta marker for all error tests

    # Rewrites
    count_rewrite: COUNT(x) -> SUM(x) rewrite for BOOLEAN vars
    avg_rewrite: AVG(expr) -> SUM(expr)/N rewrite with RHS scaling
    min_max: MIN/MAX aggregate linearization

    # Future
    per_clause: PER keyword

    # Edge cases
    edge_case: Boundary and degenerate input tests

    # Scale
    large_scale: Large problem performance tests

    # EXPLAIN
    explain: EXPLAIN / EXPLAIN ANALYZE output tests

    # Meta
    correctness: Oracle comparison correctness tests
    performance: Performance measurement tests

filterwarnings =
    ignore::DeprecationWarning
